<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>整车用户反馈数据看板</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/wordcloud@1.2.2/src/wordcloud2.min.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background:#f0f5f0; color:#333; min-height:100vh; }

  .header {
    background: linear-gradient(135deg, #1a7a4c 0%, #2d9a5f 50%, #3ab06a 100%);
    color:#fff; padding:28px 40px 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  .header h1 { font-size:22px; font-weight:600; letter-spacing:1px; }
  .header .sub { font-size:13px; opacity:0.8; margin-top:4px; }

  .filter-bar {
    display:flex; align-items:center; flex-wrap:wrap; gap:12px; padding:16px 40px;
    background:#fff; border-bottom:1px solid #e8efe8;
  }
  .filter-bar label { font-size:14px; color:#555; font-weight:500; }
  .filter-bar input[type="date"] {
    padding:6px 12px; border:1px solid #c8d8c8; border-radius:6px;
    font-size:13px; color:#333; background:#f8faf8; outline:none;
  }
  .filter-bar input[type="date"]:focus { border-color:#2d9a5f; }
  .filter-bar .sep { color:#999; font-size:13px; }
  .filter-bar .btn-primary {
    padding:6px 18px; background:#2d9a5f; color:#fff; border:none; border-radius:6px;
    font-size:13px; cursor:pointer; transition: background .2s;
  }
  .filter-bar .btn-primary:hover { background:#1a7a4c; }
  .filter-bar .quick-btn {
    padding:4px 12px; background:#e8f5e9; color:#2d9a5f; border:1px solid #c8e6c9;
    border-radius:14px; font-size:12px; cursor:pointer; transition:all .2s;
  }
  .filter-bar .quick-btn:hover, .filter-bar .quick-btn.active {
    background:#2d9a5f; color:#fff; border-color:#2d9a5f;
  }

  .container { padding:24px 40px 40px; max-width:1400px; margin:0 auto; }

  .cards { display:grid; grid-template-columns: repeat(2, 1fr); gap:20px; margin-bottom:24px; }
  .card {
    background:#fff; border-radius:12px; padding:24px 28px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.05); border-left:4px solid #2d9a5f;
    display:flex; flex-direction:column; gap:8px;
  }
  .card .card-title { font-size:14px; color:#888; font-weight:400; }
  .card .card-value { font-size:36px; font-weight:700; color:#1a7a4c; }
  .card .card-sub { font-size:12px; color:#aaa; }

  .chart-section {
    background:#fff; border-radius:12px; padding:24px 28px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.05); margin-bottom:24px;
  }
  .chart-section .chart-title { font-size:15px; font-weight:600; color:#333; margin-bottom:16px; }
  .chart-wrapper { position:relative; width:100%; }
  .chart-wrapper-bar { height:400px; }
  .chart-wrapper-line { height:350px; }
  .chart-wrapper-pie { height:350px; max-width:500px; margin:0 auto; }
  .chart-wrapper-wordcloud { height:320px; display:flex; align-items:center; justify-content:center; }

  .charts-row {
    display:grid; grid-template-columns: 3fr 2fr; gap:24px; margin-bottom:24px;
  }

  /* Local filter for wordcloud & vehicle bar */
  .local-filter-bar {
    display:flex; flex-wrap:wrap; gap:8px; margin-bottom:16px; align-items:center;
  }
  .local-filter-bar .filter-label {
    font-size:13px; color:#666; font-weight:500; margin-right:4px;
  }
  .local-filter-bar .filter-btn {
    padding:4px 12px; background:#f5f9f5; color:#555; border:1px solid #d8e8d8;
    border-radius:14px; font-size:12px; cursor:pointer; transition:all .2s;
    white-space:nowrap;
  }
  .local-filter-bar .filter-btn:hover { border-color:#2d9a5f; color:#2d9a5f; }
  .local-filter-bar .filter-btn.active {
    background:#2d9a5f; color:#fff; border-color:#2d9a5f;
  }
  .local-filter-group { margin-bottom:10px; }

  .footer { text-align:center; padding:20px; color:#bbb; font-size:12px; }

  @media (max-width:768px) {
    .charts-row { grid-template-columns: 1fr; }
    .cards { grid-template-columns: 1fr; }
    .container { padding:16px; }
    .header, .filter-bar { padding-left:16px; padding-right:16px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>整车用户反馈数据看板</h1>
  <div class="sub">数据来源：用户反馈系统 ｜ 最后更新：<span id="updateTime">-</span></div>
</div>

<div class="filter-bar">
  <label>📅 日期范围</label>
  <input type="date" id="startDate">
  <span class="sep">至</span>
  <input type="date" id="endDate">
  <button class="btn-primary" onclick="applyFilter()">筛选</button>
  <button class="btn-primary" onclick="resetFilter()">重置</button>
  <span style="margin-left:8px;font-size:13px;color:#888;">快捷：</span>
  <button class="quick-btn" onclick="quickRange(7, this)">近7天</button>
  <button class="quick-btn" onclick="quickRange(30, this)">近30天</button>
  <button class="quick-btn" onclick="quickRange(90, this)">近90天</button>
  <button class="quick-btn" onclick="quickRange(0, this)">全部</button>
</div>

<div class="container">
  <div class="cards">
    <div class="card">
      <div class="card-title">总反馈数</div>
      <div class="card-value" id="totalFeedback">-</div>
      <div class="card-sub" id="totalFeedbackSub">当前筛选范围内</div>
    </div>
    <div class="card">
      <div class="card-title">反馈人数</div>
      <div class="card-value" id="uniqueUsers">-</div>
      <div class="card-sub" id="uniqueUsersSub">去重用户数</div>
    </div>
  </div>

  <div class="chart-section">
    <div class="chart-title">📊 反馈数量趋势（按来源堆叠）</div>
    <div class="chart-wrapper chart-wrapper-bar">
      <canvas id="trendChart"></canvas>
    </div>
  </div>

  <div class="charts-row">
    <div class="chart-section" style="margin-bottom:0">
      <div class="chart-title">📈 月度负面率变化趋势</div>
      <div class="chart-wrapper chart-wrapper-line">
        <canvas id="negRateChart"></canvas>
      </div>
    </div>
    <div class="chart-section" style="margin-bottom:0">
      <div class="chart-title">👥 反馈用户身份分布</div>
      <div class="chart-wrapper chart-wrapper-pie">
        <canvas id="identityChart"></canvas>
      </div>
    </div>
  </div>

  <!-- New section: Word Cloud + Vehicle Stacked Bar with local filters -->
  <div class="chart-section">
    <div class="chart-title">🏷️ 一级问题分类分布</div>
    <div class="local-filter-group" id="modelFilterGroup">
      <span class="filter-label">车型：</span>
      <span id="modelFilterBtns"></span>
    </div>
    <div class="local-filter-group" id="yearFilterGroup">
      <span class="filter-label">年款：</span>
      <span id="yearFilterBtns"></span>
    </div>
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:24px; margin-top:12px;">
      <div>
        <div class="chart-wrapper chart-wrapper-wordcloud">
          <canvas id="wordCloudCanvas" width="500" height="300"></canvas>
        </div>
      </div>
      <div>
        <div style="font-size:13px;color:#888;margin-bottom:8px;font-weight:500;">各车型反馈数量（按情感色彩堆叠）</div>
        <div class="chart-wrapper" style="height:300px;">
          <canvas id="vehicleBarChart"></canvas>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="footer">整车用户反馈数据看板 · 数据每日更新（T+1）</div>

<script>
(function() {
  var rawData = null;
  var trendChart = null;
  var negRateChart = null;
  var identityChart = null;
  var vehicleBarChart = null;
  var wordCloudInstance = null;

  var COLORS = [
    '#2d9a5f','#4db87c','#7bc99b','#a8dbb9','#d4eed9',
    '#1a7a4c','#e8a838','#5b8def','#e85b5b','#9b6dd7','#c8c8c8'
  ];
  var PIE_COLORS = ['#2d9a5f','#4db87c','#e8a838','#a8dbb9'];
  var SENTIMENT_COLORS = { '负向':'#e85b5b', '中性':'#4db87c', '正向':'#5b8def', '未知':'#c8c8c8', '':'#ddd' };

  var currentNrIndices = [];

  // Local filter state
  var selectedModels = [];  // empty = all
  var selectedYears = [];   // empty = all

  function loadData() {
    fetch('data.json')
      .then(function(resp) { return resp.json(); })
      .then(function(data) {
        rawData = data;
        document.getElementById('updateTime').textContent = new Date().toLocaleDateString('zh-CN');
        document.getElementById('startDate').value = rawData.summary.date_range[0];
        document.getElementById('endDate').value = rawData.summary.date_range[1];
        buildLocalFilters();
        renderAll(rawData.summary.date_range[0], rawData.summary.date_range[1]);
      })
      .catch(function(err) { console.error('Failed to load data:', err); });
  }

  // Build model and year filter buttons
  function buildLocalFilters() {
    var models = rawData.filter_models || [];
    var years = rawData.filter_years || [];

    var modelContainer = document.getElementById('modelFilterBtns');
    var yearContainer = document.getElementById('yearFilterBtns');

    // Add "All" button for models
    var allModelBtn = document.createElement('button');
    allModelBtn.className = 'filter-btn active';
    allModelBtn.textContent = '全部';
    allModelBtn.setAttribute('data-value', '__all__');
    allModelBtn.onclick = function() { toggleModelFilter('__all__', this); };
    modelContainer.appendChild(allModelBtn);

    for (var i = 0; i < models.length; i++) {
      var btn = document.createElement('button');
      btn.className = 'filter-btn';
      btn.textContent = models[i];
      btn.setAttribute('data-value', models[i]);
      btn.onclick = function() { toggleModelFilter(this.getAttribute('data-value'), this); };
      modelContainer.appendChild(btn);
    }

    // Add "All" button for years
    var allYearBtn = document.createElement('button');
    allYearBtn.className = 'filter-btn active';
    allYearBtn.textContent = '全部';
    allYearBtn.setAttribute('data-value', '__all__');
    allYearBtn.onclick = function() { toggleYearFilter('__all__', this); };
    yearContainer.appendChild(allYearBtn);

    for (var j = 0; j < years.length; j++) {
      var ybtn = document.createElement('button');
      ybtn.className = 'filter-btn';
      ybtn.textContent = years[j];
      ybtn.setAttribute('data-value', years[j]);
      ybtn.onclick = function() { toggleYearFilter(this.getAttribute('data-value'), this); };
      yearContainer.appendChild(ybtn);
    }
  }

  function toggleModelFilter(value, btn) {
    if (value === '__all__') {
      selectedModels = [];
      var btns = document.querySelectorAll('#modelFilterBtns .filter-btn');
      for (var i = 0; i < btns.length; i++) btns[i].classList.remove('active');
      btn.classList.add('active');
    } else {
      // Remove "all" active state
      var allBtn = document.querySelector('#modelFilterBtns .filter-btn[data-value="__all__"]');
      if (allBtn) allBtn.classList.remove('active');

      var idx = selectedModels.indexOf(value);
      if (idx >= 0) {
        selectedModels.splice(idx, 1);
        btn.classList.remove('active');
      } else {
        selectedModels.push(value);
        btn.classList.add('active');
      }
      // If nothing selected, re-activate "all"
      if (selectedModels.length === 0) {
        if (allBtn) allBtn.classList.add('active');
      }
    }
    renderLocalCharts();
  }

  function toggleYearFilter(value, btn) {
    if (value === '__all__') {
      selectedYears = [];
      var btns = document.querySelectorAll('#yearFilterBtns .filter-btn');
      for (var i = 0; i < btns.length; i++) btns[i].classList.remove('active');
      btn.classList.add('active');
    } else {
      var allBtn = document.querySelector('#yearFilterBtns .filter-btn[data-value="__all__"]');
      if (allBtn) allBtn.classList.remove('active');

      var idx = selectedYears.indexOf(value);
      if (idx >= 0) {
        selectedYears.splice(idx, 1);
        btn.classList.remove('active');
      } else {
        selectedYears.push(value);
        btn.classList.add('active');
      }
      if (selectedYears.length === 0) {
        if (allBtn) allBtn.classList.add('active');
      }
    }
    renderLocalCharts();
  }

  function getFilteredCrossData() {
    var crossData = rawData.cross_data || [];
    var filtered = [];
    for (var i = 0; i < crossData.length; i++) {
      var row = crossData[i];
      var model = row[0], year = row[1], cat = row[2], sent = row[3], cnt = row[4];
      if (selectedModels.length > 0 && selectedModels.indexOf(model) < 0) continue;
      if (selectedYears.length > 0 && selectedYears.indexOf(year) < 0) continue;
      filtered.push(row);
    }
    return filtered;
  }

  function renderLocalCharts() {
    var filtered = getFilteredCrossData();

    // Aggregate for word cloud: category -> count
    var catMap = {};
    for (var i = 0; i < filtered.length; i++) {
      var cat = filtered[i][2];
      catMap[cat] = (catMap[cat] || 0) + filtered[i][4];
    }
    var wordList = [];
    for (var c in catMap) {
      wordList.push([c, catMap[c]]);
    }
    wordList.sort(function(a, b) { return b[1] - a[1]; });

    // Render word cloud
    renderWordCloud(wordList);

    // Aggregate for vehicle bar: model -> { sentiment -> count }
    var modelSentMap = {};
    var sentimentSet = {};
    for (var j = 0; j < filtered.length; j++) {
      var m = filtered[j][0], s = filtered[j][3], cnt2 = filtered[j][4];
      if (!modelSentMap[m]) modelSentMap[m] = {};
      modelSentMap[m][s] = (modelSentMap[m][s] || 0) + cnt2;
      sentimentSet[s] = true;
    }
    var sentiments = Object.keys(sentimentSet).sort();
    var modelNames = Object.keys(modelSentMap).sort(function(a, b) {
      var totalA = 0, totalB = 0;
      for (var k in modelSentMap[a]) totalA += modelSentMap[a][k];
      for (var k in modelSentMap[b]) totalB += modelSentMap[b][k];
      return totalB - totalA;
    });

    // Build datasets
    var barDatasets = [];
    for (var si = 0; si < sentiments.length; si++) {
      var sent = sentiments[si];
      var dataArr = [];
      for (var mi = 0; mi < modelNames.length; mi++) {
        dataArr.push(modelSentMap[modelNames[mi]][sent] || 0);
      }
      barDatasets.push({
        label: sent || '未知',
        data: dataArr,
        backgroundColor: SENTIMENT_COLORS[sent] || '#ccc',
        borderWidth: 0,
        barPercentage: 0.7,
        categoryPercentage: 0.85
      });
    }

    // Render vehicle bar chart
    if (vehicleBarChart) vehicleBarChart.destroy();
    var ctx = document.getElementById('vehicleBarChart').getContext('2d');
    vehicleBarChart = new Chart(ctx, {
      type: 'bar',
      data: { labels: modelNames, datasets: barDatasets },
      options: {
        indexAxis: 'y',
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: {
            position: 'bottom',
            labels: { padding: 10, usePointStyle: true, pointStyle: 'rectRounded', font: { size: 11 } }
          },
          tooltip: {
            backgroundColor: 'rgba(255,255,255,0.95)',
            titleColor: '#333', bodyColor: '#555',
            borderColor: '#ddd', borderWidth: 1,
            callbacks: {
              footer: function(items) {
                var total = 0;
                for (var t = 0; t < items.length; t++) total += items[t].parsed.x;
                return '合计: ' + total.toLocaleString();
              }
            }
          }
        },
        scales: {
          x: {
            stacked: true,
            ticks: { font: { size: 10 }, callback: function(v) { return v.toLocaleString(); } },
            grid: { color: '#f0f0f0' },
            title: { display: true, text: '反馈数量', font: { size: 11 }, color: '#999' }
          },
          y: {
            stacked: true,
            ticks: { font: { size: 11 } },
            grid: { display: false }
          }
        }
      }
    });
  }

  function renderWordCloud(wordList) {
    var canvas = document.getElementById('wordCloudCanvas');
    if (!canvas || wordList.length === 0) return;

    // Calculate font sizes based on counts
    var maxCount = wordList[0][1];
    var minCount = wordList[wordList.length - 1][1];
    var minFontSize = 12;
    var maxFontSize = 60;

    var list = [];
    for (var i = 0; i < wordList.length; i++) {
      var ratio = (wordList[i][1] - minCount) / (maxCount - minCount || 1);
      var fontSize = Math.round(minFontSize + ratio * (maxFontSize - minFontSize));
      list.push([wordList[i][0], fontSize]);
    }

    var wcColors = [
      '#1a7a4c', '#2d9a5f', '#4db87c', '#3ab06a', '#7bc99b',
      '#e8a838', '#5b8def', '#9b6dd7', '#e85b5b'
    ];

    WordCloud(canvas, {
      list: list,
      gridSize: 8,
      weightFactor: 1,
      fontFamily: 'PingFang SC, Microsoft YaHei, sans-serif',
      color: function() {
        return wcColors[Math.floor(Math.random() * wcColors.length)];
      },
      backgroundColor: '#fff',
      rotateRatio: 0.3,
      rotationSteps: 2,
      shuffle: true,
      drawOutOfBound: false
    });
  }

  function renderAll(start, end) {
    try {
      var labels = rawData.chart.labels;
      var datasets = rawData.chart.datasets;
      var indices = [];
      var i;
      for (i = 0; i < labels.length; i++) {
        if (labels[i] >= start && labels[i] <= end) indices.push(i);
      }

      var totalFb = 0;
      var filteredLabels = [];
      var filteredDatasets = [];
      for (var di = 0; di < datasets.length; di++) {
        var ds = datasets[di];
        var newData = [];
        for (var ii = 0; ii < indices.length; ii++) {
          newData.push(ds.data[indices[ii]]);
        }
        var sum = 0;
        for (var j = 0; j < newData.length; j++) sum += newData[j];
        totalFb += sum;
        filteredDatasets.push({ label: ds.label, data: newData });
      }
      for (var k = 0; k < indices.length; k++) {
        filteredLabels.push(labels[indices[k]]);
      }

      var allTotal = rawData.summary.total_feedback;
      var ratio = totalFb / allTotal;
      var estUsers = Math.round(rawData.summary.unique_users * ratio);

      document.getElementById('totalFeedback').textContent = totalFb.toLocaleString();
      document.getElementById('uniqueUsers').textContent = estUsers.toLocaleString();
      document.getElementById('totalFeedbackSub').textContent = start + ' 至 ' + end;
      document.getElementById('uniqueUsersSub').textContent = '去重用户数（估算）';

      var barDatasets = [];
      for (var bi = 0; bi < filteredDatasets.length; bi++) {
        barDatasets.push({
          label: filteredDatasets[bi].label,
          data: filteredDatasets[bi].data,
          backgroundColor: COLORS[bi % COLORS.length],
          borderWidth: 0,
          barPercentage: 0.85,
          categoryPercentage: 0.9
        });
      }

      if (trendChart) trendChart.destroy();
      trendChart = new Chart(document.getElementById('trendChart').getContext('2d'), {
        type: 'bar',
        data: { labels: filteredLabels, datasets: barDatasets },
        options: {
          responsive: true, maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: { position: 'bottom', labels: { padding: 12, usePointStyle: true, pointStyle: 'rectRounded', font: { size: 11 } } },
            tooltip: {
              backgroundColor: 'rgba(255,255,255,0.95)', titleColor: '#333', bodyColor: '#555',
              borderColor: '#ddd', borderWidth: 1,
              callbacks: { footer: function(items) { var t=0; for(var x=0;x<items.length;x++) t+=items[x].parsed.y; return '合计: '+t.toLocaleString(); } }
            }
          },
          scales: {
            x: { stacked: true, ticks: { maxRotation: 45, font: { size: 10 }, maxTicksLimit: 30 }, grid: { display: false } },
            y: { stacked: true, ticks: { font: { size: 11 }, callback: function(v) { return v.toLocaleString(); } }, grid: { color: '#f0f0f0' },
                 title: { display: true, text: '反馈数量', font: { size: 12 }, color: '#999' } }
          }
        }
      });
    } catch (e) { console.error('Error rendering stacked bar chart:', e); }

    // === Negative Rate Line Chart ===
    try {
      var nr = rawData.negative_rate;
      currentNrIndices = [];
      var fixedStartMonth = '2026-01';
      for (var ni = 0; ni < nr.labels.length; ni++) {
        if (nr.labels[ni] >= fixedStartMonth) currentNrIndices.push(ni);
      }
      var nrLabels = [], nrData = [];
      for (var nj = 0; nj < currentNrIndices.length; nj++) {
        nrLabels.push(nr.labels[currentNrIndices[nj]]);
        nrData.push(nr.data[currentNrIndices[nj]]);
      }

      if (negRateChart) negRateChart.destroy();
      negRateChart = new Chart(document.getElementById('negRateChart').getContext('2d'), {
        type: 'line',
        data: { labels: nrLabels, datasets: [{ label: '负面率 (%)', data: nrData, borderColor: '#e85b5b', backgroundColor: 'rgba(232,91,91,0.08)', fill: true, tension: 0.35, pointRadius: 5, pointHoverRadius: 7, pointBackgroundColor: '#e85b5b', pointBorderColor: '#fff', pointBorderWidth: 2, borderWidth: 2.5 }] },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: 'rgba(255,255,255,0.95)', titleColor: '#333', bodyColor: '#555', borderColor: '#ddd', borderWidth: 1,
              callbacks: {
                label: function(ctx) { return '负面率: ' + ctx.parsed.y + '%'; },
                afterLabel: function(ctx) { var idx = currentNrIndices[ctx.dataIndex]; return '负向: ' + nr.negative[idx] + ' / 总计: ' + nr.total[idx]; }
              }
            }
          },
          scales: {
            x: { grid: { display: false }, ticks: { font: { size: 11 } } },
            y: { ticks: { font: { size: 11 }, callback: function(v) { return v + '%'; } }, grid: { color: '#f0f0f0' },
                 title: { display: true, text: '负面率', font: { size: 12 }, color: '#999' }, beginAtZero: true }
          }
        }
      });
    } catch (e) { console.error('Error rendering negative rate chart:', e); }

    // === Identity Pie Chart ===
    try {
      var id = rawData.identity;
      var idLabels = [], idValues = [];
      for (var mi = 0; mi < id.length; mi++) { idLabels.push(id[mi].name); idValues.push(id[mi].value); }

      if (identityChart) identityChart.destroy();
      identityChart = new Chart(document.getElementById('identityChart').getContext('2d'), {
        type: 'doughnut',
        data: { labels: idLabels, datasets: [{ data: idValues, backgroundColor: PIE_COLORS, borderColor: '#fff', borderWidth: 3, hoverOffset: 8 }] },
        options: {
          responsive: true, maintainAspectRatio: false, cutout: '52%',
          plugins: {
            legend: { position: 'bottom', labels: { padding: 16, usePointStyle: true, pointStyle: 'circle', font: { size: 12 } } },
            tooltip: {
              backgroundColor: 'rgba(255,255,255,0.95)', titleColor: '#333', bodyColor: '#555', borderColor: '#ddd', borderWidth: 1,
              callbacks: {
                label: function(ctx) {
                  var total = 0; for (var ti = 0; ti < ctx.dataset.data.length; ti++) total += ctx.dataset.data[ti];
                  var pct = (ctx.parsed / total * 100).toFixed(1);
                  return ' ' + ctx.label + ': ' + ctx.parsed.toLocaleString() + ' (' + pct + '%)';
                }
              }
            }
          }
        }
      });
    } catch (e) { console.error('Error rendering identity chart:', e); }

    // === Render local charts (word cloud + vehicle bar) ===
    renderLocalCharts();
  }

  window.applyFilter = function() {
    var s = document.getElementById('startDate').value;
    var e = document.getElementById('endDate').value;
    if (s && e && s <= e) renderAll(s, e);
  };

  window.resetFilter = function() {
    var dr = rawData.summary.date_range;
    document.getElementById('startDate').value = dr[0];
    document.getElementById('endDate').value = dr[1];
    var btns = document.querySelectorAll('.quick-btn');
    for (var b = 0; b < btns.length; b++) btns[b].classList.remove('active');
    renderAll(dr[0], dr[1]);
  };

  window.quickRange = function(days, btn) {
    var btns = document.querySelectorAll('.quick-btn');
    for (var b = 0; b < btns.length; b++) btns[b].classList.remove('active');
    if (btn) btn.classList.add('active');
    var maxD = rawData.summary.date_range[1];
    var endDate = new Date(maxD + 'T00:00:00');
    if (days === 0) {
      var minD = rawData.summary.date_range[0];
      document.getElementById('startDate').value = minD;
      document.getElementById('endDate').value = maxD;
      renderAll(minD, maxD);
    } else {
      var startDate = new Date(endDate);
      startDate.setDate(startDate.getDate() - days + 1);
      var s = startDate.getFullYear() + '-' + String(startDate.getMonth()+1).padStart(2,'0') + '-' + String(startDate.getDate()).padStart(2,'0');
      document.getElementById('startDate').value = s;
      document.getElementById('endDate').value = maxD;
      renderAll(s, maxD);
    }
  };

  loadData();
})();
</script>
</body>
</html>
