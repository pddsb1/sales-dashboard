<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>整车用户反馈数据看板</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background:#f0f5f0; color:#333; min-height:100vh; }

  .header {
    background: linear-gradient(135deg, #1a7a4c 0%, #2d9a5f 50%, #3ab06a 100%);
    color:#fff; padding:28px 40px 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  .header h1 { font-size:22px; font-weight:600; letter-spacing:1px; }
  .header .sub { font-size:13px; opacity:0.8; margin-top:4px; }

  .filter-bar {
    display:flex; align-items:center; gap:16px; padding:16px 40px;
    background:#fff; border-bottom:1px solid #e8efe8;
  }
  .filter-bar label { font-size:14px; color:#555; font-weight:500; }
  .filter-bar input[type="date"] {
    padding:6px 12px; border:1px solid #c8d8c8; border-radius:6px;
    font-size:13px; color:#333; background:#f8faf8; outline:none;
  }
  .filter-bar input[type="date"]:focus { border-color:#2d9a5f; }
  .filter-bar .sep { color:#999; font-size:13px; }
  .filter-bar button {
    padding:6px 18px; background:#2d9a5f; color:#fff; border:none; border-radius:6px;
    font-size:13px; cursor:pointer; transition: background .2s;
  }
  .filter-bar button:hover { background:#1a7a4c; }
  .filter-bar .quick-btn {
    padding:4px 12px; background:#e8f5e9; color:#2d9a5f; border:1px solid #c8e6c9;
    border-radius:14px; font-size:12px; cursor:pointer; transition:all .2s;
  }
  .filter-bar .quick-btn:hover, .filter-bar .quick-btn.active {
    background:#2d9a5f; color:#fff; border-color:#2d9a5f;
  }

  .container { padding:24px 40px 40px; }

  .cards { display:grid; grid-template-columns: repeat(2, 1fr); gap:20px; margin-bottom:24px; }
  .card {
    background:#fff; border-radius:12px; padding:24px 28px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.05); border-left:4px solid #2d9a5f;
    display:flex; flex-direction:column; gap:8px;
  }
  .card .card-title { font-size:14px; color:#888; font-weight:400; }
  .card .card-value { font-size:36px; font-weight:700; color:#1a7a4c; }
  .card .card-sub { font-size:12px; color:#aaa; }

  .chart-section {
    background:#fff; border-radius:12px; padding:24px 28px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.05); margin-bottom:24px;
  }
  .chart-section .chart-title { font-size:15px; font-weight:600; color:#333; margin-bottom:16px; }
  .chart-wrapper { position:relative; height:380px; }

  .charts-row {
    display:grid; grid-template-columns: 1.2fr 0.8fr; gap:20px; margin-bottom:24px;
  }
  .charts-row .chart-wrapper { height:340px; }

  .footer { text-align:center; padding:20px; color:#bbb; font-size:12px; }
</style>
</head>
<body>

<div class="header">
  <h1>整车用户反馈数据看板</h1>
  <div class="sub">数据来源：用户反馈系统 ｜ 最后更新：<span id="updateTime">-</span></div>
</div>

<div class="filter-bar">
  <label>📅 日期范围</label>
  <input type="date" id="startDate">
  <span class="sep">至</span>
  <input type="date" id="endDate">
  <button onclick="applyFilter()">筛选</button>
  <button onclick="resetFilter()">重置</button>
  <span style="margin-left:12px;font-size:13px;color:#888;">快捷：</span>
  <button class="quick-btn" onclick="quickRange(7)">近7天</button>
  <button class="quick-btn" onclick="quickRange(30)">近30天</button>
  <button class="quick-btn" onclick="quickRange(90)">近90天</button>
  <button class="quick-btn" onclick="quickRange(0)">全部</button>
</div>

<div class="container">
  <div class="cards">
    <div class="card">
      <div class="card-title">总反馈数</div>
      <div class="card-value" id="totalFeedback">-</div>
      <div class="card-sub" id="totalFeedbackSub">当前筛选范围内</div>
    </div>
    <div class="card">
      <div class="card-title">反馈人数</div>
      <div class="card-value" id="uniqueUsers">-</div>
      <div class="card-sub" id="uniqueUsersSub">去重用户数</div>
    </div>
  </div>

  <div class="chart-section">
    <div class="chart-title">📊 反馈数量趋势（按来源堆叠）</div>
    <div class="chart-wrapper">
      <canvas id="trendChart"></canvas>
    </div>
  </div>

  <div class="charts-row">
    <div class="chart-section" style="margin-bottom:0">
      <div class="chart-title">📈 月度负面率变化趋势</div>
      <div class="chart-wrapper">
        <canvas id="negRateChart"></canvas>
      </div>
    </div>
    <div class="chart-section" style="margin-bottom:0">
      <div class="chart-title">👥 反馈用户身份分布</div>
      <div class="chart-wrapper">
        <canvas id="identityChart"></canvas>
      </div>
    </div>
  </div>
</div>

<div class="footer">整车用户反馈数据看板 · 数据每日更新（T+1）</div>

<script>
let rawData = null;
let trendChart = null;
let negRateChart = null;
let identityChart = null;

const COLORS = [
  '#2d9a5f','#4db87c','#7bc99b','#a8dbb9','#d4eed9',
  '#1a7a4c','#e8a838','#5b8def','#e85b5b','#9b6dd7','#c8c8c8'
];

const PIE_COLORS = ['#2d9a5f','#4db87c','#e8a838','#a8dbb9'];

async function loadData() {
  const resp = await fetch('data.json');
  rawData = await resp.json();
  document.getElementById('updateTime').textContent = new Date().toLocaleDateString('zh-CN');
  document.getElementById('startDate').value = rawData.summary.date_range[0];
  document.getElementById('endDate').value = rawData.summary.date_range[1];
  renderAll(rawData.summary.date_range[0], rawData.summary.date_range[1]);
}

function renderAll(start, end) {
  // --- Cards & Stacked Bar ---
  const labels = rawData.chart.labels;
  const datasets = rawData.chart.datasets;
  const indices = [];
  for (let i = 0; i < labels.length; i++) {
    if (labels[i] >= start && labels[i] <= end) indices.push(i);
  }

  let totalFb = 0;
  const filteredLabels = indices.map(i => labels[i]);
  const filteredDatasets = datasets.map(ds => {
    const data = indices.map(i => ds.data[i]);
    totalFb += data.reduce((a,b) => a+b, 0);
    return { ...ds, data };
  });

  const allTotal = rawData.summary.total_feedback;
  const ratio = totalFb / allTotal;
  const estUsers = Math.round(rawData.summary.unique_users * ratio);

  document.getElementById('totalFeedback').textContent = totalFb.toLocaleString();
  document.getElementById('uniqueUsers').textContent = estUsers.toLocaleString();
  document.getElementById('totalFeedbackSub').textContent = `${start} 至 ${end}`;
  document.getElementById('uniqueUsersSub').textContent = `去重用户数（估算）`;

  // Stacked Bar Chart
  const barDatasets = filteredDatasets.map((ds, idx) => ({
    label: ds.label,
    data: ds.data,
    backgroundColor: COLORS[idx % COLORS.length],
    borderWidth: 0,
    barPercentage: 0.85,
    categoryPercentage: 0.9,
  }));

  if (trendChart) trendChart.destroy();
  trendChart = new Chart(document.getElementById('trendChart').getContext('2d'), {
    type: 'bar',
    data: { labels: filteredLabels, datasets: barDatasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode:'index', intersect:false },
      plugins: {
        legend: { position:'bottom', labels: { padding:12, usePointStyle:true, pointStyle:'rectRounded', font:{size:11} } },
        tooltip: {
          backgroundColor:'rgba(255,255,255,0.95)', titleColor:'#333', bodyColor:'#555',
          borderColor:'#ddd', borderWidth:1,
          callbacks: { footer: items => '合计: ' + items.reduce((a,i) => a + i.parsed.y, 0).toLocaleString() }
        }
      },
      scales: {
        x: { stacked:true, ticks:{ maxRotation:45, font:{size:10}, maxTicksLimit:30 }, grid:{display:false} },
        y: { stacked:true, ticks:{ font:{size:11}, callback: v=>v.toLocaleString() }, grid:{color:'#f0f0f0'},
             title:{display:true, text:'反馈数量', font:{size:12}, color:'#999'} }
      }
    }
  });

  // --- Negative Rate Line Chart (monthly) ---
  const nr = rawData.negative_rate;
  // Filter months within date range
  const nrIndices = [];
  for (let i = 0; i < nr.labels.length; i++) {
    const monthEnd = nr.labels[i] + '-31';
    if (nr.labels[i] >= start.slice(0,7) && nr.labels[i] <= end.slice(0,7)) {
      nrIndices.push(i);
    }
  }

  if (negRateChart) negRateChart.destroy();
  negRateChart = new Chart(document.getElementById('negRateChart').getContext('2d'), {
    type: 'line',
    data: {
      labels: nrIndices.map(i => nr.labels[i]),
      datasets: [{
        label: '负面率 (%)',
        data: nrIndices.map(i => nr.data[i]),
        borderColor: '#e85b5b',
        backgroundColor: 'rgba(232,91,91,0.08)',
        fill: true,
        tension: 0.35,
        pointRadius: 5,
        pointHoverRadius: 7,
        pointBackgroundColor: '#e85b5b',
        pointBorderColor: '#fff',
        pointBorderWidth: 2,
        borderWidth: 2.5
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display:false },
        tooltip: {
          backgroundColor:'rgba(255,255,255,0.95)', titleColor:'#333', bodyColor:'#555',
          borderColor:'#ddd', borderWidth:1,
          callbacks: {
            label: ctx => `负面率: ${ctx.parsed.y}%`,
            afterLabel: ctx => {
              const idx = nrIndices[ctx.dataIndex];
              return `负向: ${nr.negative[idx]} / 总计: ${nr.total[idx]}`;
            }
          }
        }
      },
      scales: {
        x: { grid:{display:false}, ticks:{font:{size:11}} },
        y: {
          ticks:{ font:{size:11}, callback: v => v + '%' },
          grid:{color:'#f0f0f0'},
          title:{display:true, text:'负面率', font:{size:12}, color:'#999'},
          beginAtZero: true
        }
      }
    }
  });

  // --- Identity Pie Chart ---
  const id = rawData.identity;
  if (identityChart) identityChart.destroy();
  identityChart = new Chart(document.getElementById('identityChart').getContext('2d'), {
    type: 'doughnut',
    data: {
      labels: id.map(d => d.name),
      datasets: [{
        data: id.map(d => d.value),
        backgroundColor: PIE_COLORS,
        borderColor: '#fff',
        borderWidth: 3,
        hoverOffset: 8
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      cutout: '52%',
      plugins: {
        legend: { position:'bottom', labels:{ padding:16, usePointStyle:true, pointStyle:'circle', font:{size:12} } },
        tooltip: {
          backgroundColor:'rgba(255,255,255,0.95)', titleColor:'#333', bodyColor:'#555',
          borderColor:'#ddd', borderWidth:1,
          callbacks: {
            label: ctx => {
              const total = ctx.dataset.data.reduce((a,b)=>a+b,0);
              const pct = (ctx.parsed / total * 100).toFixed(1);
              return ` ${ctx.label}: ${ctx.parsed.toLocaleString()} (${pct}%)`;
            }
          }
        }
      }
    }
  });
}

function applyFilter() {
  const s = document.getElementById('startDate').value;
  const e = document.getElementById('endDate').value;
  if (s && e && s <= e) renderAll(s, e);
}

function resetFilter() {
  const dr = rawData.summary.date_range;
  document.getElementById('startDate').value = dr[0];
  document.getElementById('endDate').value = dr[1];
  document.querySelectorAll('.quick-btn').forEach(b => b.classList.remove('active'));
  renderAll(dr[0], dr[1]);
}

function quickRange(days) {
  document.querySelectorAll('.quick-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  const maxD = rawData.summary.date_range[1];
  const end = new Date(maxD);
  if (days === 0) {
    const minD = rawData.summary.date_range[0];
    document.getElementById('startDate').value = minD;
    document.getElementById('endDate').value = maxD;
    renderAll(minD, maxD);
  } else {
    const start = new Date(end);
    start.setDate(start.getDate() - days + 1);
    const s = start.toISOString().slice(0,10);
    document.getElementById('startDate').value = s;
    document.getElementById('endDate').value = maxD;
    renderAll(s, maxD);
  }
}

loadData();
</script>
</body>
</html>
